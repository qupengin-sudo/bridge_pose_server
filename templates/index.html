<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>橋式健身系統</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: sans-serif; text-align: center; background-color: #f4f4f4; }
        .btn-primary { padding: 15px 40px; font-size: 20px; cursor: pointer; background-color: #4CAF50; color: white; border: none; border-radius: 5px;}
        .btn-primary:hover { background-color: #45a049; }

        .records-page { width: 90%; max-width: 900px; margin: 20px auto; display: none; }
        .chart-section { background: white; padding: 20px; border-radius: 10px; margin-bottom: 20px; }
        .table-section { background: white; padding: 20px; border-radius: 10px; }
        .records-table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        .records-table th, .records-table td { padding: 10px 12px; border-bottom: 1px solid #eee; text-align: center; }
        .records-table th { background-color: #4CAF50; color: white; position: sticky; top: 0; }
        .records-table tr:hover { background-color: #f5f5f5; }
        .pagination { margin-top: 15px; display: flex; justify-content: center; align-items: center; gap: 8px; }
        .pagination button { padding: 6px 14px; border: 1px solid #ccc; background: white; border-radius: 4px; cursor: pointer; }
        .pagination button:hover { background: #eee; }
        .pagination button.active { background: #4CAF50; color: white; border-color: #4CAF50; }
        .pagination button:disabled { opacity: 0.4; cursor: default; }
        .records-summary { color: #666; margin-bottom: 10px; }
        .filter-bar { margin-bottom: 15px; background: #f9f9f9; padding: 10px; border-radius: 8px; display: inline-block; }
        .filter-bar label { font-weight: bold; margin-right: 5px; }
        .filter-bar select, .filter-bar input { padding: 5px 10px; cursor: pointer; }
        .search-bar { background: #f9f9f9; padding: 15px; border-radius: 8px; margin-bottom: 15px; display: flex; flex-wrap: wrap; gap: 12px; justify-content: center; align-items: center; }
        .search-bar label { font-weight: bold; font-size: 14px; }
        .search-bar input, .search-bar select { padding: 5px 8px; border: 1px solid #ccc; border-radius: 4px; }
        .search-bar button { padding: 6px 16px; background: #4CAF50; color: white; border: none; border-radius: 4px; cursor: pointer; }
        .search-bar button:hover { background: #45a049; }
        .search-bar .reset-btn { background: #888; }
        .search-bar .reset-btn:hover { background: #666; }
    </style>
</head>
<body>
    <div style="text-align: right; padding: 10px;">
        <span id="user_greeting" style="margin-right: 15px; font-weight: bold; color: #333;">訪客</span>
        <button id="auth_btn">登入 / 註冊</button>
        <button id="logout_btn" style="display: none;">登出</button>
        <button id="show_all_records_btn" style="display: none;">查看所有紀錄</button>
    </div>

    <div id="main_content" style="text-align: center; margin-top: 100px;">
        <h1>橋式健身輔助系統</h1>
        <button id="start_btn" class="btn-primary">開始運動</button>
    </div>

    <!-- 合併後的紀錄頁面：上方圖表 + 下方列表 -->
    <div id="records_page" class="records-page">
        <div class="chart-section">
            <h3>每日運動紀錄圖表</h3>
            <div class="filter-bar">
                <label for="days_filter">顯示天數：</label>
                <input type="number" id="days_filter" value="7" min="1" max="50" style="width: 60px;" oninput="onDaysChanged()">
                <span style="color: #999; font-size: 12px; margin-left: 5px;">(1~50 天)</span>
            </div>
            <canvas id="dailyChart"></canvas>
        </div>

        <div class="table-section">
            <h3>所有運動紀錄</h3>
            <div class="search-bar">
                <label>日期範圍：</label>
                <input type="date" id="search_date_from">
                <span>~</span>
                <input type="date" id="search_date_to">

                <label>運動時長：</label>
                <select id="search_duration_op">
                    <option value="">不限</option>
                    <option value="eq">等於</option>
                    <option value="lte">小於等於</option>
                    <option value="gte">大於等於</option>
                </select>
                <input type="number" id="search_duration_val" value="" min="1" placeholder="分鐘" style="width: 60px;">
                <span style="font-size: 13px; color: #666;">分鐘</span>

                <button onclick="searchRecords(1)">搜尋</button>
                <button class="reset-btn" onclick="resetSearch()">重置</button>
            </div>
            <div class="records-summary" id="records_summary"></div>
            <div style="max-height: 500px; overflow-y: auto;">
                <table class="records-table">
                    <thead>
                        <tr>
                            <th>#</th>
                            <th>日期時間</th>
                            <th>正確次數</th>
                            <th>錯誤次數</th>
                            <th>運動時長</th>
                        </tr>
                    </thead>
                    <tbody id="records_tbody"></tbody>
                </table>
            </div>
            <div class="pagination" id="pagination_controls"></div>
        </div>
        <br>
        <button onclick="closeRecordsPage()">返回主頁</button>
    </div>

    <div id="auth_page" style="display: none; text-align: center; margin-top: 50px;">
        <h2>帳號管理</h2>
        <div id="auth_choice">
            <button onclick="showRegisterForm()">我要註冊</button>
            <button onclick="showLoginForm()">我要登入</button>
        </div>
        <div id="form_container" style="margin-top: 20px;"></div>
        <br><br>
        <button id="back_home_btn">返回主頁</button>
    </div>

    <script>
        let currentUser = "";
        let dailyChartInstance = null;
        let pendingRecord = null;

        const startBtn = document.getElementById('start_btn');
        const userGreeting = document.getElementById('user_greeting');
        const showAllRecordsBtn = document.getElementById('show_all_records_btn');
        const recordsPage = document.getElementById('records_page');
        const mainContent = document.getElementById('main_content');
        const authBtn = document.getElementById('auth_btn');
        const authPage = document.getElementById('auth_page');
        const backHomeBtn = document.getElementById('back_home_btn');
        const logoutBtn = document.getElementById('logout_btn');
        const formContainer = document.getElementById('form_container');

        // --- 頁面載入時檢查 cookie 自動登入 ---
        function restoreSession() {
            fetch('/me')
                .then(res => res.json())
                .then(data => {
                    if (data.status === 'success' && data.username) {
                        currentUser = data.username;
                        authBtn.style.display = 'none';
                        logoutBtn.style.display = 'inline-block';
                        userGreeting.innerText = "你好，" + currentUser;
                        showAllRecordsBtn.style.display = 'inline-block';
                    }
                });
        }
        restoreSession();

        // 每次運動後用的顏色池（堆疊用）
        const sessionColors = [
            'rgba(32, 185, 28, 0.7)',
            'rgba(54, 162, 235, 0.7)',
            'rgba(255, 159, 64, 0.7)',
            'rgba(153, 102, 255, 0.7)',
            'rgba(255, 99, 132, 0.7)',
            'rgba(255, 205, 86, 0.7)',
            'rgba(75, 192, 192, 0.7)',
            'rgba(201, 203, 207, 0.7)',
        ];

        // --- 核心：開始運動 ---
        startBtn.onclick = function() {
            startBtn.innerText = "視訊啟動中...";
            startBtn.disabled = true;

            fetch('/open_app', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username: currentUser })
            })
            .then(res => res.json())
            .then(data => {
                startBtn.innerText = "開始運動";
                startBtn.disabled = false;

                let count = data.correct_count;
                let duration = data.duration;

                if (count === 0) {
                    alert("您這次沒有完成任何橋式動作，因此不予紀錄喔！下次繼續加油！");
                    return;
                }

                if (currentUser === "") {
                    pendingRecord = { duration: duration, count: count };
                    alert(`運動結束！您做了 ${count} 次，共 ${duration} 秒。\n小提示：現在登入或註冊，系統會自動為您存檔喔！`);
                } else {
                    alert(`運動結束！成績已為您自動存檔 (${count} 次 / ${duration} 秒)。`);
                    openRecordsPage();
                }
            })
            .catch(err => {
                console.error(err);
                alert("系統發生錯誤或您已手動關閉視窗。");
                startBtn.innerText = "開始運動";
                startBtn.disabled = false;
            });
        };

        // --- 紀錄頁面開關 ---
        showAllRecordsBtn.onclick = function() {
            openRecordsPage();
        };

        function openRecordsPage() {
            mainContent.style.display = 'none';
            recordsPage.style.display = 'block';
            loadDailyChart();
            loadAllRecords(1);
        }

        function closeRecordsPage() {
            recordsPage.style.display = 'none';
            mainContent.style.display = 'block';
        }

        // --- 天數輸入自動更新（防抖） ---
        let daysTimer = null;
        function onDaysChanged() {
            clearTimeout(daysTimer);
            daysTimer = setTimeout(() => loadDailyChart(), 400);
        }

        // --- 每日堆疊圖表 ---
        function loadDailyChart() {
            let days = parseInt(document.getElementById('days_filter').value) || 7;
            if (days < 1) days = 1;
            if (days > 50) days = 50;
            document.getElementById('days_filter').value = days;
            fetch(`/get_daily_stats/${currentUser}?days=${days}`)
                .then(res => res.json())
                .then(data => {
                    drawStackedChart(data.dates, data.sessions);
                });
        }

        function drawStackedChart(dates, sessions) {
            const canvas = document.getElementById('dailyChart');
            const ctx = canvas.getContext('2d');
            if (dailyChartInstance) { dailyChartInstance.destroy(); }

            // 找出單日最多幾次運動（決定要幾個 dataset）
            let maxSessions = 0;
            sessions.forEach(s => { if (s.length > maxSessions) maxSessions = s.length; });
            // 至少保留 1 個 dataset，讓空日顯示 0
            if (maxSessions === 0) maxSessions = 1;

            // 建立 datasets：每個 dataset 是「第 N 次運動」
            const datasets = [];
            for (let i = 0; i < maxSessions; i++) {
                const color = sessionColors[i % sessionColors.length];
                datasets.push({
                    label: `第 ${i + 1} 次運動`,
                    data: sessions.map(dayArr => (dayArr[i] ? dayArr[i].correct : 0)),
                    backgroundColor: color,
                    borderColor: color.replace('0.7', '1'),
                    borderWidth: 1,
                    maxBarThickness: 40,
                });
            }

            dailyChartInstance = new Chart(ctx, {
                type: 'bar',
                data: { labels: dates, datasets: datasets },
                options: {
                    responsive: true,
                    scales: {
                        x: { stacked: true },
                        y: { stacked: true, beginAtZero: true, title: { display: true, text: '正確次數' } }
                    },
                    plugins: {
                        tooltip: {
                            callbacks: {
                                label: function(context) {
                                    const idx = context.datasetIndex;
                                    const dayIdx = context.dataIndex;
                                    const session = sessions[dayIdx][idx];
                                    if (!session) return '';
                                    const m = Math.floor(session.duration / 60);
                                    const s = session.duration % 60;
                                    return `第 ${idx + 1} 次：${session.correct} 次 (${m}分${s}秒)`;
                                }
                            }
                        },
                        legend: {
                            display: maxSessions > 1
                        }
                    }
                }
            });
        }

        // --- 紀錄列表（分頁，支援搜尋） ---
        let isSearchMode = false;

        function loadAllRecords(page) {
            fetch(`/get_all_records/${currentUser}?page=${page}&per_page=20`)
                .then(res => res.json())
                .then(data => renderRecordsTable(data, (p) => loadAllRecords(p)));
        }

        function searchRecords(page) {
            const dateFrom = document.getElementById('search_date_from').value;
            const dateTo = document.getElementById('search_date_to').value;
            const durOp = document.getElementById('search_duration_op').value;
            const durMinutes = parseInt(document.getElementById('search_duration_val').value) || 0;

            let url = `/search_records/${currentUser}?page=${page}&per_page=20`;
            if (dateFrom) url += `&date_from=${dateFrom}`;
            if (dateTo) url += `&date_to=${dateTo}`;
            if (durOp && durMinutes > 0) {
                url += `&duration_op=${durOp}&duration_val=${durMinutes * 60}`;
            }

            isSearchMode = true;
            fetch(url)
                .then(res => res.json())
                .then(data => renderRecordsTable(data, (p) => searchRecords(p)));
        }

        function resetSearch() {
            document.getElementById('search_date_from').value = '';
            document.getElementById('search_date_to').value = '';
            document.getElementById('search_duration_op').value = '';
            document.getElementById('search_duration_val').value = '';
            isSearchMode = false;
            loadAllRecords(1);
        }

        function renderRecordsTable(data, pageCallback) {
            const tbody = document.getElementById('records_tbody');
            const summary = document.getElementById('records_summary');
            const pagination = document.getElementById('pagination_controls');

            summary.innerText = `共 ${data.total} 筆紀錄（第 ${data.page} / ${data.total_pages} 頁）`;

            tbody.innerHTML = '';
            const startNum = (data.page - 1) * data.per_page;
            data.records.forEach((r, i) => {
                const m = Math.floor(r.duration_seconds / 60);
                const s = r.duration_seconds % 60;
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td>${startNum + i + 1}</td>
                    <td>${new Date(r.timestamp + 'Z').toLocaleString()}</td>
                    <td>${r.correct_count}</td>
                    <td>${r.error_count}</td>
                    <td>${m}分${s}秒</td>
                `;
                tbody.appendChild(tr);
            });

            pagination.innerHTML = '';
            const prevBtn = document.createElement('button');
            prevBtn.innerText = '上一頁';
            prevBtn.disabled = data.page <= 1;
            prevBtn.onclick = () => pageCallback(data.page - 1);
            pagination.appendChild(prevBtn);

            let startPage = Math.max(1, data.page - 2);
            let endPage = Math.min(data.total_pages, startPage + 4);
            if (endPage - startPage < 4) startPage = Math.max(1, endPage - 4);

            for (let p = startPage; p <= endPage; p++) {
                const btn = document.createElement('button');
                btn.innerText = p;
                if (p === data.page) btn.classList.add('active');
                btn.onclick = () => pageCallback(p);
                pagination.appendChild(btn);
            }

            const nextBtn = document.createElement('button');
            nextBtn.innerText = '下一頁';
            nextBtn.disabled = data.page >= data.total_pages;
            nextBtn.onclick = () => pageCallback(data.page + 1);
            pagination.appendChild(nextBtn);
        }

        // --- 登入與註冊 ---
        authBtn.onclick = function() {
            mainContent.style.display = 'none';
            authPage.style.display = 'block';
        }
        backHomeBtn.onclick = function() {
            authPage.style.display = 'none';
            mainContent.style.display = 'block';
        }

        function showRegisterForm() {
            formContainer.innerHTML = `
                <div style="background: white; padding: 20px; border: 1px solid #ddd; border-radius: 10px; display: inline-block;">
                    <h3>會員註冊</h3>
                    <input type="text" id="reg_user" placeholder="請輸入帳號"><br><br>
                    <input type="password" id="reg_pass" placeholder="請輸入密碼"><br><br>
                    <button onclick="handleRegister()" style="padding: 5px 15px;">完成註冊</button>
                </div>
            `;
        }

        function showLoginForm() {
            formContainer.innerHTML = `
                <div style="background: white; padding: 20px; border: 1px solid #ddd; border-radius: 10px; display: inline-block;">
                    <h3>會員登入</h3>
                    <input type="text" id="login_user" placeholder="帳號"><br><br>
                    <input type="password" id="login_pass" placeholder="密碼"><br><br>
                    <button onclick="handleLogin()" style="padding: 5px 15px;">登入</button>
                </div>
            `;
        }

        function handleRegister() {
            const u = document.getElementById('reg_user').value;
            const p = document.getElementById('reg_pass').value;
            if (u === "" || p === "") { alert("不能留白喔！"); return; }

            fetch('/register', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username: u, password: p })
            })
            .then(res => res.json())
            .then(data => {
                if (data.status === "success") {
                    alert(data.message);
                    showLoginForm();
                } else {
                    alert("註冊失敗：" + data.message);
                }
            });
        }

        function handleLogin() {
            const u = document.getElementById('login_user').value;
            const p = document.getElementById('login_pass').value;
            if (u === "" || p === "") { alert("請輸入帳號和密碼！"); return; }

            fetch('/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username: u, password: p })
            })
            .then(res => res.json())
            .then(data => {
                if (data.status === "success") {
                    currentUser = u;
                    authBtn.style.display = 'none';
                    logoutBtn.style.display = 'inline-block';
                    userGreeting.innerText = "你好，" + u;
                    showAllRecordsBtn.style.display = 'inline-block';

                    authPage.style.display = 'none';
                    mainContent.style.display = 'block';

                    if (pendingRecord !== null) {
                        fetch('/save_record', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({
                                username: currentUser,
                                correct: pendingRecord.count,
                                error: 0,
                                duration: pendingRecord.duration
                            })
                        }).then(res => res.json()).then(saveData => {
                            alert(`登入成功！已將您稍早的運動紀錄 (${pendingRecord.count}次) 自動存檔！`);
                            pendingRecord = null;
                            openRecordsPage();
                        });
                    } else {
                        alert(data.message);
                    }
                } else {
                    alert(data.message);
                }
            });
        }

        // --- 登出功能 ---
        logoutBtn.onclick = function() {
            fetch('/logout', { method: 'POST' });
            currentUser = "";
            pendingRecord = null;

            userGreeting.innerText = "訪客";
            authBtn.style.display = 'inline-block';
            logoutBtn.style.display = 'none';
            showAllRecordsBtn.style.display = 'none';
            recordsPage.style.display = 'none';
            mainContent.style.display = 'block';

            if (dailyChartInstance) {
                dailyChartInstance.destroy();
                dailyChartInstance = null;
            }

            alert("您已成功登出！");
        };
    </script>
</body>
</html>
